services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geoloc-app
    ports:
      - "8090:8090"
    environment:
      SERVER_PORT: 8090
      DB_URL: jdbc:postgresql://${DB_HOST:-postgres}:${DB_PORT:-5432}/${DB_NAME:-geoloc}
      DB_USERNAME: ${DB_USER:-geoloc}
      DB_PASSWORD: ${DB_PASSWORD:-geoloc}
      JAVA_OPTS: "-Xmx1024m -Xms512m"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8090/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - geoloc-network

  postgres:
    image: postgis/postgis:17-3.4-alpine
    container_name: geoloc-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-geoloc}
      POSTGRES_USER: ${DB_USER:-geoloc}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-geoloc}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-geoloc}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - geoloc-network

volumes:
  postgres_data:
    driver: local

networks:
  geoloc-network:
    driver: bridge